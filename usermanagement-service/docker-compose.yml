services:
  db-usermanagement:
    image: postgres:17
    ports:
      - "5433:5432"
    volumes:
      - .:/app
      - postgres_data_user:/var/lib/postgresql/data
    entrypoint: ["/app/docker/entrypoint_db.sh"]
    networks:
      - my_network

  usermanagement:
    build:
      context: ./docker
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=True
    env_file:
      - .env
    networks:
      my_network:
        aliases:
          - usermanagment

    entrypoint: ["/app/docker/entrypoint_dev.sh"]
    depends_on:
      - db-usermanagement

volumes:
  postgres_data_user:

networks:
  my_network: